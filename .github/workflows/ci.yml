
name: build

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 90

        permissions:
            contents: read
            packages: read

        steps:

            - name: Configure local hosts
              run: echo "127.0.0.1 athorrent.local"  | sudo tee -a /etc/hosts

            - name: Start test environment
              run: bash docker/scripts/up-test-env.sh

            - name: Run Cypress tests
              uses: cypress-io/github-action@v6
              with:
                  working-directory: tests
                  install-command: corepack enable && yarn install --immutable
                  command: yarn cypress run

            - name: Dump docker logs on failure
              if: failure()
              run: cat backend-manager.log

    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        strategy:
            max-parallel: 1
            matrix:
                include:
                    - target: php
                    - target: nginx

        steps:
            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}-${{matrix.target}}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  push: true
                  file: docker/Dockerfile
                  target: ${{matrix.target}}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{matrix.target}}
                  cache-to: type=gha,mode=max,scope=${{matrix.target}}
