
name: build

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        strategy:
            max-parallel: 1
            matrix:
                include:
                    - target: php
                    - target: nginx

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.target }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,format=long,prefix=

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  push: true
                  pull: true
                  file: docker/Dockerfile
                  target: ${{ matrix.target }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=build-${{ github.ref_name }}
                  cache-to: type=gha,mode=max,scope=build-${{ github.ref_name }}

    e2e:
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 90

        permissions:
            contents: read
            packages: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for php image
              id: meta-php
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}-php
                  tags: type=sha,format=long,prefix=

            - name: Extract metadata for nginx image
              id: meta-nginx
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}-nginx
                  tags: type=sha,format=long,prefix=

            - name: Configure local hosts
              run: echo "127.0.0.1 athorrent.local"  | sudo tee -a /etc/hosts

            - name: Start test environment
              env:
                  ATHORRENT_PHP_IMAGE: ${{ steps.meta-php.outputs.tags }}
                  ATHORRENT_NGINX_IMAGE: ${{ steps.meta-nginx.outputs.tags }}
              run: bash docker/scripts/up-env.sh test ci

            - name: Run Cypress tests
              uses: cypress-io/github-action@v7
              with:
                  working-directory: tests
                  install-command: yarn install --immutable
                  command: yarn run --binaries-only cypress run
              env:
                  YARN_ENABLE_SCRIPTS: "true"

            - name: Dump docker logs on failure
              if: failure()
              run: docker logs athorrent-test-backend-manager-1
