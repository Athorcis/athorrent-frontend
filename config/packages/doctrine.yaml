doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'

    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        mappings:
            Athorrent:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Database/Entity'
                prefix: 'Athorrent\Database\Entity'
                alias: Athorrent

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            # Disabling it for now since it's buggy
            # it hydrates two times the User::hasRoles collection on certain conditions
            # to reproduce in dev :
            # - login
            # - change app.cache to apcu
            # - reload
            # - then the next reload hydrates twice
            # It causes logout because roles between refreshedUser and stored user doesn't match
            #second_level_cache:
            #    enabled: true
            #    region_cache_driver:
            #        type: pool
            #        pool: doctrine.second_level_cache_pool
            metadata_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.second_level_cache_pool:
                    adapter: cache.app
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
