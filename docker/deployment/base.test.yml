
volumes:
    db_data:
    user_data:

x-php-base: &php-base
    build:
        args: &build_args
            - SYMFONY_APP_ENV=test
            - COMPOSER_ARGS=
    env_file:
        - ../../.env.test
    volumes:
        - db_data:/var/www/athorrent/var/lib
        - user_data:/var/www/athorrent/var/user

services:
    backend-manager:
        <<: *php-base

    php:
        <<: *php-base

    nginx:
        build:
            args: *build_args
        volumes:
            - user_data:/var/www/athorrent/var/user:ro
